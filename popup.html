<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Devin Session Exporter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>Devin Session Exporter</h1>
      <label for="format">Format</label>
      <select id="format">
        <option value="markdown">Markdown</option>
        <option value="json">JSON</option>
        <option value="text">Plain text</option>
      </select>
      <label class="checkbox-label">
        <input id="include-conversation" type="checkbox" checked>
        Include conversation
      </label>
      <label class="checkbox-label">
        <input id="include-worklog" type="checkbox">
        Include worklog
      </label>
      <label class="checkbox-label">
        <input id="include-changes" type="checkbox">
        Include changes
      </label>
      <label class="checkbox-label">
        <input id="include-thoughts" type="checkbox">
        Include Devin's thoughts
      </label>
      <button id="export" type="button">Export</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="formatters.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
